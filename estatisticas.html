<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estatísticas</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
font-size:20px;
}

button{
margin-top:20px;
padding:10px;
background:#3b82f6;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

<body>

<h1>📈 Estatísticas</h1>

<div class="card">
Total enviados: <span id="total">...</span>
</div>

<button onclick="voltar()">← Voltar</button>

<script>
const API = "https://api-push.onrender.com";

// 🔥 BUSCAR DADOS
async function load(){
try{

const res = await fetch(API + "/stats",{
headers:{
Authorization: "123" // ✅ CORREÇÃO AQUI
}
});

const data = await res.json();

// 🔥 GARANTIA EXTRA
document.getElementById("total").innerText = data.total ?? 0;

}catch(err){
console.log(err);
document.getElementById("total").innerText = "Erro";
}
}

function voltar(){
window.location.href = "dashboard.html";
}

load();
</script>

</body>
</html>
