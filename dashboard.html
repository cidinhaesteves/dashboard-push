<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Push</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  color: white;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

.counter {
  font-size: 12px;
  text-align: right;
  opacity: 0.7;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.btn-send { background: #22c55e; }
.btn-history { background: #3b82f6; }
.btn-exit { background: #ef4444; }

.preview-box {
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  white-space: pre-wrap;
  word-wrap: break-word;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>🚀 Push Dashboard</h2>

    <input id="title" maxlength="30" placeholder="Título">
    <div class="counter" id="countTitle">0 / 30</div>

    <textarea id="message" maxlength="120" placeholder="Mensagem"></textarea>
    <div class="counter" id="countMsg">0 / 120</div>

    <button class="btn-send" onclick="sendPush()">Enviar Push</button>

    <button class="btn-history" onclick="goHistorico()">📊 Histórico</button>

    <button class="btn-history" onclick="goStats()">📈 Estatísticas</button>

    <button class="btn-exit" onclick="logout()">Sair</button>

    <div id="status"></div>
  </div>

  <div class="card">
    <h3>📱 Preview</h3>
    <div class="preview-box">
      <strong id="previewTitle">Título...</strong><br>
      <span id="previewMsg">Mensagem...</span>
    </div>
  </div>

</div>

<script>
const API = "https://api-push.onrender.com";

// 🔐 VERIFICA LOGIN AO ENTRAR
window.onload = () => {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "index.html";
  }
};

// ELEMENTOS
const titleInput = document.getElementById("title");
const msgInput = document.getElementById("message");

// CONTADORES
titleInput.oninput = () => {
  document.getElementById("countTitle").innerText = titleInput.value.length + " / 30";
  document.getElementById("previewTitle").innerText = titleInput.value || "Título...";
};

msgInput.oninput = () => {
  document.getElementById("countMsg").innerText = msgInput.value.length + " / 120";
  document.getElementById("previewMsg").innerText = msgInput.value || "Mensagem...";
};

// 🚀 ENVIO REAL (CORRIGIDO)
async function sendPush() {
  const token = localStorage.getItem("token");

  if (!token) {
    document.getElementById("status").innerText = "❌ Faça login novamente";
    return;
  }

  const title = titleInput.value;
  const body = msgInput.value;

  try {
    const res = await fetch(API + "/send-push", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ title, body })
    });

    const data = await res.json();

    // 🚨 SE NÃO FOR SUCESSO → NÃO SALVA
    if (!res.ok) {
      document.getElementById("status").innerText = "❌ Erro: " + (data.error || "Falha");
      return;
    }

    // ✅ AGORA SIM SALVA HISTÓRICO
    let historico = JSON.parse(localStorage.getItem("historico")) || [];

    historico.push({
      title,
      body,
      date: new Date().toLocaleString()
    });

    localStorage.setItem("historico", JSON.stringify(historico));

    document.getElementById("status").innerText = "✅ Push enviado REAL";

    // LIMPAR
    titleInput.value = "";
    msgInput.value = "";

    document.getElementById("countTitle").innerText = "0 / 30";
    document.getElementById("countMsg").innerText = "0 / 120";

    document.getElementById("previewTitle").innerText = "Título...";
    document.getElementById("previewMsg").innerText = "Mensagem...";

  } catch (error) {
    document.getElementById("status").innerText = "❌ Erro de conexão";
  }
}

// NAV
function goHistorico() {
  window.location.href = "historico.html";
}

function goStats() {
  window.location.href = "estatisticas.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}
</script>

</body>
</html>
