<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Push</title>

<style>
body {
  background: #0f172a;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.container {
  display: flex;
  gap: 40px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 320px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
  outline: none;
}

textarea {
  resize: none;
  height: 100px;
}

.counter {
  font-size: 12px;
  color: #94a3b8;
  text-align: right;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.enviar {
  background: #22c55e;
  color: white;
}

.sair {
  background: #ef4444;
  color: white;
}

.preview {
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
</style>

</head>

<body>

<div class="container">

  <!-- FORM -->

  <div class="box">
    <h2>🚀 NEW PUSH</h2>

```
<input id="titulo" placeholder="Título (máx 30)" maxlength="30">
<div class="counter" id="countTitulo">0 / 30</div>

<textarea id="mensagem" placeholder="Mensagem (máx 120)" maxlength="120"></textarea>
<div class="counter" id="countMsg">0 / 120</div>

<button class="enviar" onclick="enviarPush()">Enviar Push</button>
<button class="sair" onclick="logout()">Sair</button>
```

  </div>

  <!-- PREVIEW -->

  <div class="box">
    <h2>📱 Preview</h2>
    <div class="preview">
      <strong id="previewTitulo">Título...</strong>
      <p id="previewMensagem">Mensagem...</p>
    </div>
  </div>

</div>

<script>

// ELEMENTOS
const tituloInput = document.getElementById("titulo");
const msgInput = document.getElementById("mensagem");

// PREVIEW + CONTADOR
tituloInput.addEventListener("input", () => {
  document.getElementById("previewTitulo").innerText =
    tituloInput.value || "Título...";

  document.getElementById("countTitulo").innerText =
    tituloInput.value.length + " / 30";
});

msgInput.addEventListener("input", () => {
  document.getElementById("previewMensagem").innerText =
    msgInput.value || "Mensagem...";

  document.getElementById("countMsg").innerText =
    msgInput.value.length + " / 120";
});

// ENVIAR PUSH (CORRIGIDO PARA /send)
async function enviarPush() {
  const titulo = tituloInput.value.trim();
  const mensagem = msgInput.value.trim();

  if (!titulo || !mensagem) {
    alert("Preencha título e mensagem ❌");
    return;
  }

  try {
    const res = await fetch("https://api-push.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ titulo, mensagem })
    });

    const text = await res.text();

    if (!res.ok) {
      console.error("ERRO BACKEND:", text);
      alert("Erro ao enviar ❌");
      return;
    }

    alert("✅ Push enviado com sucesso!");

    tituloInput.value = "";
    msgInput.value = "";

    document.getElementById("countTitulo").innerText = "0 / 30";
    document.getElementById("countMsg").innerText = "0 / 120";

  } catch (err) {
    alert("Erro de conexão ❌");
    console.error(err);
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("logado");
  window.location.href = "index.html";
}

</script>

</body>
</html>
