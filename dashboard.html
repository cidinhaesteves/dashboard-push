<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - New Push</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      display: flex;
      gap: 30px;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .send {
      background: #22c55e;
    }

    .logout {
      background: #ef4444;
    }

    .nav {
      background: #3b82f6;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="box">
    <h3>🚀 Push Dashboard</h3>

    <input id="title" placeholder="Título">
    <textarea id="body" placeholder="Mensagem"></textarea>

    <button class="send" onclick="send()">Enviar Push</button>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <div class="box">
    <h3>📱 Navegação</h3>

    <button class="nav" onclick="go('historico.html')">Histórico</button>
    <button class="nav" onclick="go('estatisticas.html')">Estatísticas</button>
    <button class="nav" onclick="go('agendamentos.html')">⏰ Agendamentos</button>
  </div>

</div>

<script>
const API = "https://api-push.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "index.html";
}

async function send() {
  const title = document.getElementById("title").value;
  const body = document.getElementById("body").value;

  await fetch(API + "/send-push", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ title, body })
  });

  alert("Enviado 🚀");
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

function go(page) {
  window.location.href = page;
}
</script>

</body>
</html>
