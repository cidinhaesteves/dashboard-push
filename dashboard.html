<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Push</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 40px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.enviar {
  background: #22c55e;
}

.sair {
  background: #ef4444;
}

.preview {
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  min-height: 150px;
}
</style>
</head>

<body>

<div class="box">
  <h3>🚀 NEW PUSH</h3>

  <input id="titulo" maxlength="30" placeholder="Título (máx 30)">
  <textarea id="mensagem" maxlength="120" placeholder="Mensagem (máx 120)"></textarea>

  <button class="enviar" onclick="enviarPush()">Enviar Push</button>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="box">
  <h3>📱 Preview</h3>
  <div class="preview" id="preview">
    <strong id="prevTitulo"></strong>
    <p id="prevMsg"></p>
  </div>
</div>

<script>

// ==============================
// PREVIEW EM TEMPO REAL
// ==============================
document.getElementById("titulo").addEventListener("input", atualizarPreview);
document.getElementById("mensagem").addEventListener("input", atualizarPreview);

function atualizarPreview() {
  document.getElementById("prevTitulo").innerText =
    document.getElementById("titulo").value;

  document.getElementById("prevMsg").innerText =
    document.getElementById("mensagem").value;
}

// ==============================
// ENVIAR PUSH
// ==============================
async function enviarPush() {
  const titulo = document.getElementById("titulo").value;
  const mensagem = document.getElementById("mensagem").value;

  if (!titulo || !mensagem) {
    alert("Preencha todos os campos");
    return;
  }

  try {
    const response = await fetch("https://api-push.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ titulo, mensagem })
    });

    const data = await response.json();

    if (response.ok) {
      alert("✅ Push enviado com sucesso!");

      // 🔥 LIMPAR CAMPOS
      document.getElementById("titulo").value = "";
      document.getElementById("mensagem").value = "";

      // 🔥 LIMPAR PREVIEW
      document.getElementById("prevTitulo").innerText = "";
      document.getElementById("prevMsg").innerText = "";

    } else {
      alert("❌ Erro ao enviar");
    }

  } catch (err) {
    alert("❌ Erro de conexão");
  }
}

// ==============================
// LOGOUT
// ==============================
function logout() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
