<!DOCTYPE html>
<body onload="checkAuth()">
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Push</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🚀 Dashboard Push</h1>

  <h2>🔔 Enviar Global</h2>

  <input id="globalTitle" placeholder="Título" />
  <textarea id="globalBody" placeholder="Mensagem"></textarea>

  <button onclick="handleSendGlobal()">Enviar</button>

  <hr>

  <h2>👤 Enviar para Usuário (EMAIL)</h2>

  <input id="userEmail" placeholder="Email do usuário" />
  <input id="userTitle" placeholder="Título" />
  <textarea id="userBody" placeholder="Mensagem"></textarea>

  <button onclick="handleSendUser()">Enviar</button>

  <script src="app.js"></script>

  <script>
    // ================================
    // REGISTRO DO SERVICE WORKER
    // ================================
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/firebase-messaging-sw.js")
        .then(() => {
          console.log("✅ SW registrado no dashboard");
        })
        .catch(err => {
          console.error("Erro ao registrar SW:", err);
        });
    }

    // ================================
    // FUNÇÕES
    // ================================
    async function handleSendGlobal() {
      const title = document.getElementById("globalTitle").value;
      const body = document.getElementById("globalBody").value;

      if (!title || !body) {
        alert("Preencha título e mensagem");
        return;
      }

      await sendGlobal(title, body);
      alert("Enviado global!");
    }

    async function handleSendUser() {
      const email = document.getElementById("userEmail").value;
      const title = document.getElementById("userTitle").value;
      const body = document.getElementById("userBody").value;

      if (!email || !title || !body) {
        alert("Preencha todos os campos");
        return;
      }

      await sendToUser(email, title, body);
      alert("Enviado para usuário!");
    }
  </script>

  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/firebase-messaging-sw.js")
    .then(() => console.log("✅ SW registrado no dashboard"))
    .catch(err => console.error("❌ SW erro:", err));
}
</script>

</body>
</html>
