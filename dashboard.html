<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Push</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 40px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 320px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
  font-size: 14px;
}

.counter {
  font-size: 12px;
  text-align: right;
  color: #94a3b8;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.enviar {
  background: #22c55e;
}

.sair {
  background: #ef4444;
}

.preview {
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  min-height: 150px;

  /* 🔥 CORREÇÃO IMPORTANTE */
  white-space: pre-wrap;
  word-wrap: break-word;
}
</style>
</head>

<body>

<div class="box">
  <h3>🚀 NEW PUSH</h3>

  <input id="titulo" maxlength="30" placeholder="Título (máx 30)">
  <div class="counter" id="countTitulo">0 / 30</div>

  <textarea id="mensagem" maxlength="120" placeholder="Mensagem (máx 120)"></textarea>
  <div class="counter" id="countMsg">0 / 120</div>

  <button class="enviar" onclick="enviarPush()">Enviar Push</button>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="box">
  <h3>📱 Preview</h3>
  <div class="preview">
    <strong id="prevTitulo"></strong>
    <p id="prevMsg"></p>
  </div>
</div>

<script>

// ==============================
// ELEMENTOS
// ==============================
const tituloInput = document.getElementById("titulo");
const msgInput = document.getElementById("mensagem");

const prevTitulo = document.getElementById("prevTitulo");
const prevMsg = document.getElementById("prevMsg");

const countTitulo = document.getElementById("countTitulo");
const countMsg = document.getElementById("countMsg");

// ==============================
// ATUALIZAR PREVIEW + CONTADOR
// ==============================
tituloInput.addEventListener("input", atualizar);
msgInput.addEventListener("input", atualizar);

function atualizar() {
  const titulo = tituloInput.value;
  const mensagem = msgInput.value;

  prevTitulo.innerText = titulo;
  prevMsg.innerText = mensagem;

  countTitulo.innerText = `${titulo.length} / 30`;
  countMsg.innerText = `${mensagem.length} / 120`;
}

// ==============================
// ENVIAR PUSH
// ==============================
async function enviarPush() {
  const titulo = tituloInput.value.trim();
  const mensagem = msgInput.value.trim();

  if (!titulo || !mensagem) {
    alert("Preencha todos os campos");
    return;
  }

  try {
    const response = await fetch("https://api-push.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ titulo, mensagem })
    });

    const data = await response.json();

    if (response.ok) {
      alert("✅ Push enviado com sucesso!");

      // 🔥 LIMPEZA COMPLETA (SEM QUEBRAR LAYOUT)
      tituloInput.value = "";
      msgInput.value = "";

      prevTitulo.innerText = "";
      prevMsg.innerText = "";

      countTitulo.innerText = "0 / 30";
      countMsg.innerText = "0 / 120";

    } else {
      alert("❌ Erro ao enviar");
      console.error(data);
    }

  } catch (err) {
    alert("❌ Erro de conexão");
    console.error(err);
  }
}

// ==============================
// LOGOUT
// ==============================
function logout() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
