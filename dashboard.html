<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Push</title>

<style>
body {
  background: #0f172a;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.container {
  display: flex;
  gap: 40px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 320px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
  outline: none;
}

textarea {
  resize: none;
  height: 100px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.enviar {
  background: #22c55e;
  color: white;
}

.sair {
  background: #ef4444;
  color: white;
}

.preview {
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;

  /* CORREÇÃO DO ESTOURO */
  word-wrap: break-word;
  overflow-wrap: break-word;
}

</style>
</head>

<body>

<div class="container">

  <!-- FORM -->
  <div class="box">
    <h2>🚀 NEW PUSH</h2>

    <input 
      id="titulo" 
      placeholder="Título (máx 30)" 
      maxlength="30"
    >

    <textarea 
      id="mensagem" 
      placeholder="Mensagem (máx 120)" 
      maxlength="120"
    ></textarea>

    <button class="enviar" onclick="enviarPush()">
      Enviar Push
    </button>

    <button class="sair" onclick="logout()">
      Sair
    </button>
  </div>

  <!-- PREVIEW -->
  <div class="box">
    <h2>📱 Preview</h2>

    <div class="preview">
      <strong id="previewTitulo">Título...</strong>
      <p id="previewMensagem">Mensagem...</p>
    </div>
  </div>

</div>

<script>

// ======================
// PREVIEW EM TEMPO REAL
// ======================

const tituloInput = document.getElementById("titulo");
const msgInput = document.getElementById("mensagem");

tituloInput.addEventListener("input", () => {
  document.getElementById("previewTitulo").innerText =
    tituloInput.value || "Título...";
});

msgInput.addEventListener("input", () => {
  document.getElementById("previewMensagem").innerText =
    msgInput.value || "Mensagem...";
});


// ======================
// ENVIAR PUSH
// ======================

async function enviarPush() {
  const titulo = tituloInput.value.trim();
  const mensagem = msgInput.value.trim();

  if (!titulo || !mensagem) {
    alert("Preencha título e mensagem ❌");
    return;
  }

  try {
    const res = await fetch("https://api-push.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ titulo, mensagem })
    });

    const data = await res.json();

    if (res.ok) {
      alert("✅ Push enviado!");
      tituloInput.value = "";
      msgInput.value = "";
    } else {
      alert("Erro: " + data.error);
    }

  } catch (err) {
    alert("Erro de conexão ❌");
    console.error(err);
  }
}


// ======================
// LOGOUT
// ======================

function logout() {
  localStorage.removeItem("logado");
  window.location.href = "index.html";
}

</script>

</body>
</html>
