<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
display:flex;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:320px;
}

input, textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:5px;
border:none;
}

.counter{
text-align:right;
font-size:12px;
opacity:0.7;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:5px;
cursor:pointer;
}

.enviar{ background:#22c55e; color:white; }
.sair{ background:#ef4444; color:white; }

.preview{
background:#334155;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.link-btn{
background:#3b82f6;
color:white;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>🚀 Push Dashboard</h3>

<input id="titulo" placeholder="Título" maxlength="30">
<div class="counter" id="countTitulo">0/30</div>

<textarea id="mensagem" placeholder="Mensagem" maxlength="120"></textarea>
<div class="counter" id="countMsg">0/120</div>

<button class="enviar" onclick="enviar()">Enviar Push</button>
<button class="sair" onclick="sair()">Sair</button>
</div>

<div class="card">
<h3>📱 Preview</h3>

<div class="preview">
<b id="pTitulo">Título...</b>
<p id="pMsg">Mensagem...</p>
</div>

<button class="link-btn" onclick="ir('historico.html')">Histórico</button>
<button class="link-btn" onclick="ir('estatisticas.html')">Estatísticas</button>
<button class="link-btn" onclick="ir('agendamentos.html')">Agendamentos</button>

</div>

</div>

<script>

const API = "https://api-push.onrender.com";

const titulo = document.getElementById("titulo");
const mensagem = document.getElementById("mensagem");

// contador
titulo.oninput = () => {
document.getElementById("pTitulo").innerText = titulo.value;
document.getElementById("countTitulo").innerText = titulo.value.length + "/30";
};

mensagem.oninput = () => {
document.getElementById("pMsg").innerText = mensagem.value;
document.getElementById("countMsg").innerText = mensagem.value.length + "/120";
};

async function enviar(){
try{

await fetch(API + "/send-push", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
title: titulo.value,
message: mensagem.value
})
});

alert("Enviado 🚀");

}catch(err){
console.log(err);
alert("Erro ao enviar push ❌");
}
}

function sair(){
window.location.href = "index.html";
}

function ir(pagina){
window.location.href = pagina;
}

</script>

</body>
</html>
