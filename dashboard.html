<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Push</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h2 {
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
}

textarea {
  resize: none;
  height: 100px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
  font-weight: bold;
}

.enviar {
  background: #22c55e;
  color: #fff;
}

.sair {
  background: #ef4444;
  color: #fff;
}

.secundario {
  background: #3b82f6;
  color: #fff;
}

.preview {
  background: #334155;
  padding: 15px;
  border-radius: 8px;
  min-height: 80px;
}

small {
  opacity: 0.6;
}
</style>

</head>

<body>

<div class="container">

  <!-- ENVIO -->
  <div class="card">
    <h2>🚀 NEW PUSH</h2>

    <input id="titulo" placeholder="Título (máx 30)">
    <small id="countTitulo">0/30</small>

    <textarea id="mensagem" placeholder="Mensagem (máx 120)"></textarea>
    <small id="countMsg">0/120</small>

    <button class="enviar" onclick="enviarPush()">Enviar Push</button>

    <button class="sair" onclick="logout()">Sair</button>
  </div>

  <!-- PREVIEW -->
  <div class="card">
    <h2>📱 Preview</h2>

    <div class="preview">
      <strong id="prevTitulo">Título...</strong>
      <p id="prevMsg">Mensagem...</p>
    </div>

    <button class="secundario" onclick="irHistorico()">📊 Histórico</button>
    <button class="secundario" onclick="irEstatisticas()">📈 Estatísticas</button>
  </div>

</div>

<script>

// 🔒 PROTEÇÃO
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/index.html";
}

// 🔥 CONTADORES + PREVIEW
const tituloInput = document.getElementById("titulo");
const msgInput = document.getElementById("mensagem");

tituloInput.addEventListener("input", () => {
  document.getElementById("countTitulo").innerText = tituloInput.value.length + "/30";
  document.getElementById("prevTitulo").innerText = tituloInput.value || "Título...";
});

msgInput.addEventListener("input", () => {
  document.getElementById("countMsg").innerText = msgInput.value.length + "/120";
  document.getElementById("prevMsg").innerText = msgInput.value || "Mensagem...";
});

// 🚀 ENVIAR PUSH
async function enviarPush() {
  const titulo = tituloInput.value;
  const mensagem = msgInput.value;

  if (!titulo || !mensagem) {
    alert("Preencha todos os campos ❌");
    return;
  }

  try {
    const res = await fetch("https://api-push.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        titulo,
        mensagem
      })
    });

    const data = await res.json();

    if (res.ok) {
      alert("✅ Push enviado com sucesso!");
      tituloInput.value = "";
      msgInput.value = "";
    } else {
      alert("Erro ao enviar ❌");
      console.log(data);
    }

  } catch (err) {
    alert("Erro de conexão ❌");
  }
}

// 🔓 LOGOUT
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/index.html";
}

// 🔗 LINKS FUTUROS
function irHistorico() {
  window.location.href = "/historico.html";
}

function irEstatisticas() {
  window.location.href = "/estatisticas.html";
}

</script>

</body>
</html>
