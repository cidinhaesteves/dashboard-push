<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agendamentos</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.row{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
flex:1;
min-width:300px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-green{background:#22c55e;color:#000;}
.btn-blue{background:#3b82f6;}
.btn-red{background:#ef4444;}

.counter{
font-size:12px;
text-align:right;
color:#94a3b8;
}

.preview{
background:#334155;
padding:15px;
border-radius:10px;
word-break:break-word;
}

.select{
margin-bottom:10px;
padding:8px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>⏰ Agendamentos</h2>

<select id="filter" class="select">
<option value="all">Todos</option>
<option value="pending">Pendentes</option>
<option value="sent">Enviados</option>
</select>

<div class="row">

<div class="card">

<input id="title" placeholder="Título" maxlength="30">
<div class="counter" id="countTitle">0/30</div>

<textarea id="body" placeholder="Mensagem" maxlength="120"></textarea>
<div class="counter" id="countBody">0/120</div>

<input id="date" type="datetime-local">

<button class="btn-green" onclick="schedule()">Agendar Push</button>

<button class="btn-blue" onclick="window.location.href='dashboard.html'">Voltar</button>

</div>

<div class="card">
<h3>📱 Preview</h3>
<div class="preview">
<strong id="pTitle">Título...</strong>
<div id="pBody">Mensagem...</div>
</div>
</div>

</div>

<h3 style="margin-top:30px;">📋 Lista</h3>
<div id="list"></div>

</div>

<script>

const API = "https://api-push.onrender.com";
const token = localStorage.getItem("token");

const title = document.getElementById("title");
const body = document.getElementById("body");

const pTitle = document.getElementById("pTitle");
const pBody = document.getElementById("pBody");

const countTitle = document.getElementById("countTitle");
const countBody = document.getElementById("countBody");

title.oninput = () => {
countTitle.innerText = title.value.length + "/30";
pTitle.innerText = title.value || "Título...";
};

body.oninput = () => {
countBody.innerText = body.value.length + "/120";
pBody.innerText = body.value || "Mensagem...";
};

async function schedule(){

await fetch(API + "/schedule", {
method: "POST",
headers: {
"Content-Type": "application/json",
Authorization: "Bearer " + token
},
body: JSON.stringify({
title: title.value,
body: body.value,
sendAt: new Date(document.getElementById("date").value)
})
});

// limpar campos
title.value = "";
body.value = "";
document.getElementById("date").value = "";

countTitle.innerText = "0/30";
countBody.innerText = "0/120";

pTitle.innerText = "Título...";
pBody.innerText = "Mensagem...";

load();
}

async function load(){

let res = await fetch(API + "/schedules", {
headers: { Authorization: "Bearer " + token }
});

let data = await res.json();

const filter = document.getElementById("filter");

if(filter.value === "pending"){
data = data.filter(i => !i.sent);
}

if(filter.value === "sent"){
data = data.filter(i => i.sent);
}

// ordem correta
data.sort((a,b) => new Date(b.sendAt) - new Date(a.sendAt));

const list = document.getElementById("list");
list.innerHTML = "";

data.forEach(i => {

list.innerHTML += `
<div class="preview" style="margin-top:10px;">
<strong>${i.title}</strong>
<div>${i.body}</div>
<div style="font-size:12px;">
📅 ${new Date(i.sendAt).toLocaleString()}
</div>

<div>
${i.sent ? "✔ Enviado" : "⏳ Pendente"}
</div>

${(!i.sent && filter.value === "pending") ? `
<button class="btn-red" onclick="cancel('${i._id}')">
Cancelar
</button>
` : ""}

</div>
`;

});

}

async function cancel(id){
await fetch(API + "/schedule/" + id, {
method: "DELETE",
headers: { Authorization: "Bearer " + token }
});
load();
}

document.getElementById("filter").onchange = load;

load();

</script>

</body>
</html>
