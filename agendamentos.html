<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agendamentos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  display: flex;
  gap: 20px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 320px;
}

.preview, .item {
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  word-wrap: break-word;
}

.counter {
  font-size: 12px;
  text-align: right;
}

button { width: 100%; padding: 10px; margin-top: 10px; }

.cancel { background: red; }
</style>
</head>

<body>

<h2>⏰ Agendamentos</h2>

<select id="filter" onchange="loadSchedules()">
<option value="all">Todos</option>
<option value="pending">Pendentes</option>
<option value="sent">Enviados</option>
</select>

<div class="container">

<div class="box">

<input id="title" maxlength="30" oninput="updatePreview()">
<div class="counter" id="tc">0/30</div>

<textarea id="body" maxlength="120" oninput="updatePreview()"></textarea>
<div class="counter" id="bc">0/120</div>

<input id="date" type="datetime-local">

<button onclick="create()">Agendar</button>

</div>

<div class="box">
<div class="preview">
<strong id="pt">Título...</strong>
<p id="pb">Mensagem...</p>
</div>
</div>

</div>

<h3>Lista</h3>
<div id="list"></div>

<script>
const API = "https://api-push.onrender.com";
const token = localStorage.getItem("token");

function updatePreview(){
pt.innerText = title.value;
pb.innerText = body.value;
tc.innerText = title.value.length+"/30";
bc.innerText = body.value.length+"/120";
}

async function create(){
await fetch(API+"/schedule",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
title:title.value,
body:body.value,
sendAt:date.value
})
});

title.value="";
body.value="";
date.value="";
updatePreview();

loadSchedules();
}

async function loadSchedules(){
const res = await fetch(API+"/schedules",{headers:{Authorization:"Bearer "+token}});
let data = await res.json();

// 🔥 ORDEM CORRETA (RECENTE PRIMEIRO)
data.sort((a,b)=> new Date(b.sendAt)-new Date(a.sendAt));

if(filter.value==="pending"){
data = data.filter(i=>!i.sent);
}
if(filter.value==="sent"){
data = data.filter(i=>i.sent);
}

list.innerHTML="";

data.forEach(i=>{
const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<strong>${i.title}</strong>
<div>${i.body}</div>
<div>${new Date(i.sendAt).toLocaleString()}</div>
<div>${i.sent?"✔ Enviado":"⏳ Pendente"}</div>
${!i.sent?`<button class="cancel" onclick="cancel('${i._id}')">Cancelar</button>`:""}
`;

list.appendChild(div);
});
}

async function cancel(id){
await fetch(API+"/schedule/"+id,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
});
loadSchedules();
}

updatePreview();
loadSchedules();
</script>

</body>
</html>
