<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agendamentos - New Push</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn {
      background: #22c55e;
      width: 100%;
    }

    .item {
      background: #334155;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 12px;
      transition: 0.2s;
    }

    .item:hover {
      transform: scale(1.01);
    }

    .status {
      font-weight: bold;
      margin-top: 5px;
    }

    .ok {
      color: #22c55e;
    }

    .wait {
      color: #facc15;
    }

    .cancel {
      background: #ef4444;
      margin-top: 10px;
      width: 100%;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>⏰ Agendamentos</h1>

<div class="top-bar">
  <select id="filter" onchange="loadSchedules()">
    <option value="all">Todos</option>
    <option value="pending">Pendentes</option>
    <option value="sent">Enviados</option>
  </select>
</div>

<div class="box">
  <input id="title" placeholder="Título">
  <textarea id="body" placeholder="Mensagem"></textarea>
  <input id="date" type="datetime-local">

  <button class="btn" onclick="createSchedule()">Agendar Push</button>
</div>

<div class="box">
  <h3>📋 Lista</h3>
  <div id="list"></div>
</div>

<script>
const API = "https://api-push.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  alert("Não autorizado");
  window.location.href = "index.html";
}

// ================= CRIAR =================
async function createSchedule() {
  const title = document.getElementById("title").value;
  const body = document.getElementById("body").value;
  const date = document.getElementById("date").value;

  if (!title || !body || !date) {
    alert("Preencha tudo");
    return;
  }

  await fetch(API + "/schedule", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      title,
      body,
      sendAt: date
    })
  });

  alert("Agendado 🚀");
  loadSchedules();
}

// ================= LISTAR =================
async function loadSchedules() {
  const filter = document.getElementById("filter").value;

  const res = await fetch(API + "/schedules", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  let data = await res.json();

  // 🔥 FILTRO
  if (filter === "pending") {
    data = data.filter(i => !i.sent);
  }

  if (filter === "sent") {
    data = data.filter(i => i.sent);
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    const status = item.sent
      ? `<span class="status ok">✔ Enviado</span>`
      : `<span class="status wait">⏳ Pendente</span>`;

    div.innerHTML = `
      <strong>${item.title}</strong>
      <div>${item.body}</div>

      <div class="meta">📅 Agendado: ${new Date(item.sendAt).toLocaleString()}</div>
      ${item.executedAt ? `<div class="meta">🚀 Executado: ${new Date(item.executedAt).toLocaleString()}</div>` : ""}

      ${status}

      ${!item.sent ? `<button class="cancel" onclick="cancel('${item._id}')">Cancelar</button>` : ""}
    `;

    list.appendChild(div);
  });
}

// ================= CANCELAR =================
async function cancel(id) {
  if (!confirm("Cancelar agendamento?")) return;

  await fetch(API + "/schedule/" + id, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  loadSchedules();
}

loadSchedules();
</script>

</body>
</html>
