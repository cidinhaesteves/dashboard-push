<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Histórico - New Push</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  padding: 20px;
}

h1 {
  color: #38bdf8;
}

.item {
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
  word-wrap: break-word;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

button {
  margin-bottom: 20px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>📊 Histórico de Envios</h1>

<button onclick="voltar()">⬅ Voltar</button>

<div id="list"></div>

<script>
const API = "https://api-push.onrender.com";
const token = localStorage.getItem("token");

async function load() {
  const res = await fetch(API + "/notifications", {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  let data = await res.json();

  // 🔥 ORDEM DECRESCENTE
  data.sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <strong>${n.title}</strong>
      <div>${n.body}</div>
      <div class="meta">📅 ${new Date(n.createdAt).toLocaleString()}</div>
    `;

    list.appendChild(div);
  });
}

function voltar() {
  window.location.href = "dashboard.html";
}

load();
</script>

</body>
</html>
