<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

  <h2>🔔 Ativar Notificações</h2>
  <button onclick="ativarNotificacoes()">Ativar Notificações</button>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCN05SpMhAbPyC1lkVy-t2xFDoc8QuR8A",
      authDomain: "eco-goias.firebaseapp.com",
      projectId: "eco-goias",
      storageBucket: "eco-goias.firebasestorage.app",
      messagingSenderId: "31870091742",
      appId: "1:31870091742:web:2ea58294b93441b47c5d4f"
    };

    firebase.initializeApp(firebaseConfig);

    const messaging = firebase.messaging();

    async function ativarNotificacoes() {
      try {
        console.log("🚀 INICIANDO...");

        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          console.log("❌ Permissão negada");
          return;
        }

        console.log("✅ PERMISSÃO OK");

        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

        console.log("✅ SW REGISTRADO");

        // 🔥 GARANTE QUE O SW ESTÁ ATIVO
        await navigator.serviceWorker.ready;

        console.log("✅ SW ATIVO");

        const token = await messaging.getToken({
          vapidKey: "BJhlpFaeDpxLkQVUXF7GNzwGTeaMw5dVJJHcxU-AFAmiyhYG2XNkf4Ny5GtkBIFk9SHF5q4bgS2bcag9OD6vdw",
          serviceWorkerRegistration: registration
        });

        console.log("🔥 TOKEN:", token);

        if (!token) {
          console.log("❌ Token não gerado");
          return;
        }

        await fetch("https://api-push.onrender.com/save-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        console.log("📱 Token enviado com sucesso!");

      } catch (error) {
        console.error("❌ ERRO COMPLETO:", error);
      }
    }
  </script>

</body>
</html>
