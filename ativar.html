<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

<h2>🔔 Ativar Notificações</h2>
<button onclick="ativar()">Ativar Notificações</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

const VAPID_KEY = "SUA_VAPID_KEY_AQUI";

async function limparServiceWorkers() {
  const regs = await navigator.serviceWorker.getRegistrations();
  for (let reg of regs) {
    await reg.unregister();
  }
  console.log("🧹 SWs removidos");
}

async function limparPushSubscription() {
  const reg = await navigator.serviceWorker.getRegistration();
  if (reg) {
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      await sub.unsubscribe();
      console.log("🧹 Subscription removida");
    }
  }
}

window.ativar = async function () {
  try {
    console.log("🚀 INICIANDO LIMPEZA...");

    await limparPushSubscription();
    await limparServiceWorkers();

    console.log("🚀 INICIANDO FLUXO...");

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada!");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    await navigator.serviceWorker.ready;

    console.log("📦 SW PRONTO");

    const token = await getToken(messaging, {
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: registration
    });

    console.log("🔥 TOKEN:", token);

    const jwt = localStorage.getItem("token");

    if (!jwt) {
      alert("Faça login primeiro");
      return;
    }

    const res = await fetch("https://api-push.onrender.com/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + jwt
      },
      body: JSON.stringify({ token })
    });

    const data = await res.json();

    console.log("💾 SALVO:", data);

    alert("✅ Notificações ativadas!");

  } catch (err) {
    console.error("❌ ERRO REAL:", err);
    alert("Erro ao ativar notificações");
  }
};
</script>

</body>
</html>
