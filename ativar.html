<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>
</head>
<body>

<h1>🔔 Ativar Notificações</h1>

<button onclick="ativar()">Ativar Notificações</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyCN05SpMfHAbPyCl1kYy-t2xFDoc8QuR8A",
  authDomain: "eco-goias.firebaseapp.com",
  projectId: "eco-goias",
  storageBucket: "eco-goias.firebasestorage.app",
  messagingSenderId: "31870091742",
  appId: "1:31870091742:web:2ea58294b93441b47c5d4f"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

window.ativar = async function () {
  try {
    console.log("🚀 INICIANDO");

    // 🔥 1. REGISTRAR SERVICE WORKER (ESSENCIAL)
    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    console.log("✅ SW REGISTRADO:", registration);

    // 🔥 2. PERMISSÃO
    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    // 🔥 3. GERAR TOKEN
    const token = await getToken(messaging, {
      vapidKey: "BJHlpFaeDpxLkQVuXF7GNzwGTeaMw5dVJJHcxU-AFAmiyhYG2XNkf4Ny5GtkB1Fk9iSHF5q4bgS2bcaq9OD6vdw",
      serviceWorkerRegistration: registration
    });

    console.log("🔥 TOKEN:", token);

    // 🔥 4. ENVIAR TOKEN PRO BACKEND
    await fetch("https://api-push.onrender.com/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token })
    });

    alert("✅ Notificações ativadas com sucesso!");

  } catch (err) {
    console.error("❌ ERRO COMPLETO:", err);
    alert("Erro ao ativar notificações");
  }
};
</script>

</body>
</html>
