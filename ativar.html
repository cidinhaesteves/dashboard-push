<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>
</head>

<body>

<h1>🔔 Ativar Notificações</h1>
<button id="btnAtivar">Ativar Notificações</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJzv86uRLFRAX1CBVejno1_89VD90J30Y",
  authDomain: "eco-goias.firebaseapp.com",
  projectId: "eco-goias",
  storageBucket: "eco-goias.firebasestorage.app",
  messagingSenderId: "31870091742",
  appId: "1:31870091742:web:f75d7509b351bfac7c5d4f"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

async function ativar() {
  try {
    console.log("🚀 INICIO ATIVAR");

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada ❌");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    console.log("✅ SW REGISTRADO");

    const token = await getToken(messaging, {
      vapidKey: "BL06_HAiVplmivWgja7ab0X4CaFV-OqMZ7riVUnkMt3Xywz-6HsCGmOsNWNATKX5c1xVD3d0WYfGa0uvxWwU",
      serviceWorkerRegistration: registration
    });

    console.log("🔥 TOKEN:", token);

    await fetch("https://api-push.onrender.com/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token })
    });

    alert("✅ Notificações ativadas com sucesso!");

  } catch (error) {
    console.error("❌ ERRO COMPLETO:", error);
    alert("Erro ao ativar notificações ❌");
  }
}

// ✅ AQUI ESTÁ A CORREÇÃO
document.getElementById("btnAtivar").addEventListener("click", ativar);

</script>

</body>
</html>
