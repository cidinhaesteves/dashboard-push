<!DOCTYPE html>

<html>
<head>
  <title>Ativar Notificações</title>
</head>
<body>

<h1>🔔 Ativar Notificações</h1>
<button onclick="ativarNotificacao()">Ativar Notificações</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

// 🔥 CONFIG REAL (JÁ PREENCHIDA)
const firebaseConfig = {
  apiKey: "AIzaSyCJzv86uRlFRAX1GBYejno1_89YD90J3OY",
  authDomain: "eco-goias.firebaseapp.com",
  projectId: "eco-goias",
  storageBucket: "eco-goias.firebasestorage.app",
  messagingSenderId: "31870091742",
  appId: "1:31870091742:web:f75d7509b351bfac7c5d4f",
  measurementId: "G-G286HDQJZ"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

async function ativarNotificacao() {
  console.log("🚀 INICIANDO");

  const permission = await Notification.requestPermission();

  if (permission !== "granted") {
    alert("Permissão negada");
    return;
  }

  console.log("✅ PERMISSÃO OK");

  const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

  console.log("✅ SW REGISTRADO:", registration);

  // 🔥 SUA VAPID KEY (JÁ PREENCHIDA)
  const token = await getToken(messaging, {
    vapidKey: "BJHIpFaeDpxLKQVxF7GNzwGTeaMw5dVJJHcxU-AFAmiyhYG2XNkf4Ny5GtKBfK9lSHF5qb4bgS2bcaq9SOD6vdw",
    serviceWorkerRegistration: registration
  });

  console.log("🔥 TOKEN:", token);

  // 🔥 ENVIO CORRETO PARA V2
  const response = await fetch("https://api-push.onrender.com/v2/save-token", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ token })
  });

  const result = await response.json();
  console.log("📡 RESPOSTA API:", result);

  if (result.success) {
    alert("Token salvo com sucesso 🚀");
  } else {
    alert("Erro ao salvar token ❌");
  }
}
</script>

</body>
</html>
