<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>
</head>

<body>

<h1>🔔 Ativar Notificações</h1>
<button id="btn">Ativar Notificações</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwisTzYQg8gSTcK3GL1vMjJpCpdXyn4fs", // ✅ NOVA KEY
  authDomain: "eco-goias.firebaseapp.com",
  projectId: "eco-goias",
  storageBucket: "eco-goias.appspot.com",
  messagingSenderId: "31870991742",
  appId: "1:31870991742:web:2ea58294b93441b47c5d4f",
  measurementId: "G-RJVTCZ41QX"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

async function ativar() {
  try {

    console.log("INICIO ATIVAR");

    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

    await navigator.serviceWorker.ready;

    console.log("SW OK");

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada ❌");
      return;
    }

    const token = await getToken(messaging, {
      vapidKey: "BDYA2CYQPxNKnJb1D80ULDUNrLv0Q4tFIC74-ZSkyvqt6VVJZtMiFhakg8_1iVQTmU4H37jh_57QKrzpQPiUMBM",
      serviceWorkerRegistration: registration
    });

    console.log("TOKEN:", token);

    if (!token) {
      alert("Erro ao gerar token ❌");
      return;
    }

    localStorage.setItem("token", token);

    await fetch("https://api-push.onrender.com/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token })
    });

    alert("Notificações ativadas com sucesso 🚀");

  } catch (err) {
    console.error("ERRO COMPLETO:", err);
    alert("Erro ao ativar notificações ❌");
  }
}

document.getElementById("btn").addEventListener("click", ativar);

</script>

</body>
</html>
