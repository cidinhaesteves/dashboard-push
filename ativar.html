<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

  <h1>🔔 Ativar Notificações</h1>

  <button onclick="ativar()">Ativar Notificações</button>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCNQ5SPMtnAbPvC11kYv-t2xEDoc8QuR8A",
      authDomain: "eco-goias.firebaseapp.com",
      projectId: "eco-goias",
      storageBucket: "eco-goias.firebasestorage.app",
      messagingSenderId: "31870091742",
      appId: "1:31870091742:web:2ea58294b93441b47c5d4f"
    };

    firebase.initializeApp(firebaseConfig);

    async function ativar() {
      try {
        console.log("🚀 INICIANDO...");

        const permission = await Notification.requestPermission();
        if (permission !== "granted") throw new Error("Permissão negada");

        console.log("✅ PERMISSÃO OK");

        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

        await navigator.serviceWorker.ready;

        console.log("✅ SW PRONTO");

        const messaging = firebase.messaging();

        // 🔥 VAPID 100% CORRETA (SEM ESPAÇO, SEM QUEBRA)
        const vapidKey = "BNKbYRqKlo8aNkr-NiLxNbZ5uXDEkXEogxnUfy33DVmzKVvSh2-AO0Sml-S5Abcwpf5ZpGjxcy2x-3d6dD9Y8";

        console.log("🔑 VAPID LENGTH:", vapidKey.length);

        const token = await messaging.getToken({
          vapidKey: vapidKey,
          serviceWorkerRegistration: registration
        });

        console.log("🔥 TOKEN:", token);

        if (!token) throw new Error("Token não gerado");

        alert("✅ Token gerado com sucesso!");

      } catch (err) {
        console.error("❌ ERRO REAL:", err);
        alert("Erro ao ativar notificações");
      }
    }
  </script>

</body>
</html>
