<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

  <h1>🔔 Ativar Notificações</h1>
  <button onclick="ativar()">Ativar Notificações</button>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

    // 🔥 CONFIG NOVA (SEU APP ATUAL)
    const firebaseConfig = {
      apiKey: "AIzaSyBspLYLvDhArpJG7UOcLQcPzjDNzyZrYGE",
      authDomain: "eco-goias.firebaseapp.com",
      projectId: "eco-goias",
      storageBucket: "eco-goias.firebasestorage.app",
      messagingSenderId: "31870091742",
      appId: "1:31870091742:web:35e2d0b7fa5a8fb77c5d4f",
      measurementId: "G-P37K5DP7Y0"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // ✅ RECEBER PUSH COM ABA ABERTA (FOREGROUND)
    onMessage(messaging, (payload) => {
      console.log("📩 Mensagem recebida (foreground):", payload);

      if (Notification.permission === "granted") {
        new Notification(payload.notification.title, {
          body: payload.notification.body,
          icon: "/icon.png"
        });
      }
    });

    async function ativar() {
      try {
        console.log("🚀 INICIANDO...");

        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          alert("Permissão negada");
          return;
        }

        console.log("✅ PERMISSÃO OK");

        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        console.log("✅ SW REGISTRADO");

        const vapidKey = "BIumtqPx8aXRJDsTgzxFtYeuAlY9P15oEKngndrZprsFUvpbjaZc1OCqxPGCexXx9-JIP95t0qyqhTus-xTlUGQ";
        console.log("🔑 VAPID LENGTH:", vapidKey.length);

        const token = await getToken(messaging, {
          vapidKey: vapidKey,
          serviceWorkerRegistration: registration
        });

        if (!token) {
          alert("Erro ao gerar token");
          return;
        }

        console.log("🎯 TOKEN GERADO:", token);

        // 🔥 ENVIA TOKEN PARA SEU BACKEND
        await fetch("https://SEU-BACKEND-AQUI/salvar-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        alert("Notificações ativadas com sucesso!");

      } catch (err) {
        console.error("❌ ERRO REAL:", err);
        alert("Erro ao ativar notificações");
      }
    }

  </script>

</body>
</html>
