<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>

<body>

<h2>🔔 Ativar Notificações</h2>
<button onclick="ativar()">Ativar Notificações</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SUA_DOMAIN",
  projectId: "SUA_PROJECT",
  storageBucket: "SUA_BUCKET",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

window.ativar = async function () {
  try {
    console.log("🚀 INICIANDO...");

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada!");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    const token = await getToken(messaging, {
      vapidKey: "SUA_VAPID_KEY"
    });

    console.log("🔥 TOKEN:", token);

    // 🔥 PEGA TOKEN JWT DO LOGIN
    const authToken = localStorage.getItem("token");

    if (!authToken) {
      alert("Faça login primeiro!");
      return;
    }

    // 🔥 DECODIFICA O TOKEN PARA PEGAR O EMAIL
    const payload = JSON.parse(atob(authToken.split(".")[1]));
    const email = payload.email;

    console.log("📧 EMAIL:", email);

    const res = await fetch("https://api-push.onrender.com/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token,
        email
      })
    });

    const data = await res.json();

    console.log("💾 SALVO:", data);

    alert("✅ Notificações ativadas!");

  } catch (err) {
    console.error("Erro geral:", err);
    alert("Erro ao salvar token");
  }
};
</script>

</body>
</html>
