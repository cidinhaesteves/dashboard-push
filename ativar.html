<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

  <h2>🔔 Ativar Notificações</h2>

  <button onclick="ativarNotificacoes()">Ativar Notificações</button>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

  <script>
    // ================================
    // CONFIG FIREBASE (SEU PROJETO)
    // ================================
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_PROJECT.firebaseapp.com",
      projectId: "SEU_PROJECT_ID",
      storageBucket: "SEU_PROJECT.appspot.com",
      messagingSenderId: "SEU_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);

    const messaging = firebase.messaging();

    // ================================
    // FUNÇÃO PRINCIPAL
    // ================================
    async function ativarNotificacoes() {
      try {
        console.log("🚀 INICIANDO...");

        const permission = await Notification.requestPermission();

        if (permission !== "granted") {
          alert("Permissão negada");
          return;
        }

        console.log("✅ PERMISSÃO OK");

        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

        console.log("✅ SW ATIVO");

        const token = await messaging.getToken({
          vapidKey: "BNK8yRqKIo8aNkr-NiLxNbZ5uXDekXEoqnxuI9y33DvMZkVvSh2-A00Sml-_s5Abcwpf5ZpGjxyC2x-z8d6D8Y8".trim(),
          serviceWorkerRegistration: registration
        });

        console.log("🔥 TOKEN:", token);

        if (!token) {
          alert("Erro ao gerar token");
          return;
        }

        // ================================
        // SALVAR TOKEN COM JWT
        // ================================
        const tokenJWT = localStorage.getItem("token");

        if (!tokenJWT) {
          alert("⚠️ Faça login antes de ativar notificações");
          return;
        }

        const res = await fetch("https://api-push.onrender.com/save-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + tokenJWT
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        console.log("📦 RESPOSTA BACKEND:", data);

        alert("✅ Notificações ativadas!");

      } catch (err) {
        console.error("❌ ERRO:", err);
        alert("Erro ao ativar notificações");
      }
    }
  </script>

</body>
</html>
