<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

<h1>🔔 Ativar Notificações</h1>
<button onclick="ativar()">Ativar Notificações</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJECT.firebaseapp.com",
  projectId: "SEU_PROJECT",
  storageBucket: "SEU_PROJECT.appspot.com",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};

// 🔥 VAPID KEY (MESMA QUE JÁ FUNCIONAVA)
const VAPID_KEY = "SUA_VAPID_KEY_AQUI";

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

// 🚀 FUNÇÃO PRINCIPAL
window.ativar = async function () {
  try {

    console.log("🚀 INICIANDO...");

    // 🔥 PEDIR PERMISSÃO
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      alert("Permissão negada!");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    // 🔥 LIMPAR SERVICE WORKERS ANTIGOS
    console.log("🧹 INICIANDO LIMPEZA...");
    const registrations = await navigator.serviceWorker.getRegistrations();
    for (let reg of registrations) {
      await reg.unregister();
    }
    console.log("🧹 SWs removidos");

    // 🔥 REGISTRAR NOVO SW
    console.log("📦 REGISTRANDO SW...");
    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    console.log("✅ SW REGISTRADO");

    // 🔥 AGUARDAR CONTROLE REAL DO SW (CORREÇÃO CRÍTICA)
    console.log("⏳ AGUARDANDO CONTROLE DO SW...");

    await new Promise((resolve) => {
      if (navigator.serviceWorker.controller) {
        resolve();
      } else {
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          resolve();
        });
      }
    });

    console.log("✅ SW CONTROLANDO A PÁGINA");

    // 🔥 GERAR TOKEN (AGORA SEM ERRO)
    const token = await getToken(messaging, {
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: registration
    });

    console.log("🔥 TOKEN:", token);

    if (!token) {
      alert("Erro ao gerar token");
      return;
    }

    // 🔥 ENVIAR PARA BACKEND
    const response = await fetch("https://api-push.onrender.com/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token })
    });

    const data = await response.json();

    console.log("📡 SALVO:", data);

    if (data.success) {
      alert("✅ Notificações ativadas!");
    } else {
      alert("Erro ao salvar token");
    }

  } catch (error) {
    console.error("❌ ERRO REAL:", error);
    alert("Erro ao ativar notificações");
  }
};

</script>

</body>
</html>
