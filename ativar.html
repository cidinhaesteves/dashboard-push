<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

  <h2>🔔 Ativar Notificações</h2>

  <button onclick="ativarNotificacoes()">Ativar Notificações</button>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCN05SpMrhAbPyC1lkYy-t2xFDoc8QuR8A",
      authDomain: "eco-goias.firebaseapp.com",
      projectId: "eco-goias",
      storageBucket: "eco-goias.firebasestorage.app",
      messagingSenderId: "31870091742",
      appId: "1:31870091742:web:2ea58294b93441b47c5d4f"
    };

    firebase.initializeApp(firebaseConfig);

    const messaging = firebase.messaging();

    async function ativarNotificacoes() {
      try {
        console.log("🚀 INICIANDO...");

        const permission = await Notification.requestPermission();

        if (permission !== "granted") {
          alert("Permissão negada");
          return;
        }

        console.log("✅ PERMISSÃO OK");

        // 🔥 REGISTRA SW
        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

        console.log("📦 SW REGISTRADO");

        // 🔥 AGUARDA SW FICAR PRONTO (CORREÇÃO REAL)
        await navigator.serviceWorker.ready;

        console.log("✅ SW PRONTO");

        const token = await messaging.getToken({
          vapidKey: "BNK8yRqKIo8aNkr-NiLxNbZ5uXDekXEoqnxuI9y33DvMZkVvSh2-A00Sml-_s5Abcwpf5ZpGjxyC2x-z8d6D8Y8",
          serviceWorkerRegistration: registration
        });

        console.log("🔥 TOKEN:", token);

        const tokenJWT = localStorage.getItem("token");

        if (!tokenJWT) {
          alert("Faça login primeiro");
          return;
        }

        const res = await fetch("https://api-push.onrender.com/save-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + tokenJWT
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        console.log("📦 SALVO:", data);

        alert("✅ Notificações ativadas!");

      } catch (err) {
        console.error("❌ ERRO:", err);
        alert("Erro ao ativar notificações");
      }
    }
  </script>

</body>
</html>
