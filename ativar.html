<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>
</head>
<body>

<h1>🔔 Ativar Notificações</h1>

<button onclick="ativar()">Ativar Notificações</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJzv86uRlFRAX1CBVejno1_89VD90J3OY",
  authDomain: "eco-goias.firebaseapp.com",
  projectId: "eco-goias",
  storageBucket: "eco-goias.firebasestorage.app",
  messagingSenderId: "31870091742",
  appId: "1:31870091742:web:f75d7509b351bfac7c5d4f"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

window.ativar = async function () {
  try {
    console.log("🚀 INICIANDO");

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    console.log("✅ SW REGISTRADO:", registration);

    // 🔥 VAPID CORRETA (COPIADA DO FIREBASE)
    const vapidKey = "BJHIpFaeDpxLKQVxF7GNzwGTeaMw5dVJJHcxU-AFAmiyhYG2XNkf4Ny5GtkB1Fk9iSHF5q4bgS2bcaq9OD6vdw";

    const token = await getToken(messaging, {
      vapidKey: vapidKey,
      serviceWorkerRegistration: registration
    });

    console.log("🔥 TOKEN:", token);

    const response = await fetch("https://api-push.onrender.com/v2/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token })
    });

    const result = await response.json();

    console.log("📡 RESPOSTA API:", result);

    if (result.success) {
      alert("✅ Notificações ativadas!");
    } else {
      alert("❌ Erro ao salvar token");
    }

  } catch (err) {
    console.error("❌ ERRO COMPLETO:", err);
    alert("Erro ao ativar notificações");
  }
};
</script>

</body>
</html>
