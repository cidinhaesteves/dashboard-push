<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>
</head>
<body>

<h2>🔔 Ativar Notificações</h2>
<button onclick="ativar()">Ativar Notificações</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyBspLYLvDhArpJG7UOcLQcPzjDNzyZrYGE",
  authDomain: "eco-goias.firebaseapp.com",
  projectId: "eco-goias",
  storageBucket: "eco-goias.firebasestorage.app",
  messagingSenderId: "31870091742",
  appId: "1:31870091742:web:35e2d0b7fa5a8fb77c5d4f",
  measurementId: "G-P37K5DP7Y0"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

async function ativar() {
  try {
    console.log("🚀 INICIANDO...");

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

    console.log("✅ SW REGISTRADO");

    const token = await getToken(messaging, {
      vapidKey: "BIumtqPx8aXRJDsTgzxFtYeuAlY9P15oEKngndrZprsFUvpbjaZc1OCqxPGCexXx9-JIP95t0qyqhTus-xTlUGQ",
      serviceWorkerRegistration: registration
    });

    if (!token) {
      throw new Error("Token não gerado");
    }

    console.log("🎯 TOKEN GERADO:", token);

    alert("Notificações ativadas com sucesso!");

  } catch (error) {
    console.error("❌ ERRO REAL:", error);
    alert("Erro ao ativar notificações");
  }
}

window.ativar = ativar;
</script>

</body>
</html>
