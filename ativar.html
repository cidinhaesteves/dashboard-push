<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>
</head>
<body>

<h1>🔔 Ativar Notificações</h1>

<button onclick="ativar()">Ativar Notificações</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

window.ativar = async function () {
  try {
    console.log("🚀 INICIANDO");

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Permissão negada");
      return;
    }

    console.log("✅ PERMISSÃO OK");

    const token = await getToken(messaging, {
      vapidKey: "SUA_VAPID_KEY"
    });

    console.log("🔥 TOKEN:", token);

    // 🚀 ENVIA TOKEN PRO BACKEND
    await fetch("https://api-push.onrender.com/save-token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token })
    });

    alert("✅ Notificações ativadas com sucesso!");

  } catch (err) {
    console.error(err);
    alert("Erro ao ativar notificações");
  }
};
</script>

</body>
</html>
