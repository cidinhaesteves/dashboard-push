<script>
const API = "https://api-push.onrender.com";

// =====================
// AUTO LOGIN
// =====================
window.onload = () => {
  const token = localStorage.getItem("token");

  if (token) {
    showDashboard();
  }
};

// =====================
// LOGIN
// =====================
async function login() {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    console.log("🔐 Tentando login...");

    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    console.log("📡 Status:", res.status);

    const data = await res.json();

    console.log("📦 Resposta:", data);

    if (data.token) {
      localStorage.setItem("token", data.token);
      showDashboard();
    } else {
      document.getElementById("loginMsg").innerHTML =
        `<div class="error">${data.error || "Erro no login"}</div>`;
    }

  } catch (err) {
    console.error("❌ ERRO LOGIN:", err);

    document.getElementById("loginMsg").innerHTML =
      `<div class="error">Erro ao conectar com servidor</div>`;
  }
}

// =====================
// MOSTRAR DASHBOARD
// =====================
function showDashboard() {
  document.getElementById("login").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// =====================
// ENVIAR PUSH
// =====================
async function sendPush() {
  try {
    const title = document.getElementById("title").value;
    const body = document.getElementById("body").value;

    const token = localStorage.getItem("token");

    const res = await fetch(`${API}/send-push`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ title, body })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById("msg").innerHTML =
        `<div class="success">✅ Enviado para ${data.sent}</div>`;
    } else {
      document.getElementById("msg").innerHTML =
        `<div class="error">${data.error}</div>`;
    }

  } catch (err) {
    document.getElementById("msg").innerHTML =
      `<div class="error">Erro ao enviar push</div>`;
  }
}
</script>
