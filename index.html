<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Push</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.btn-login { background: #22c55e; }
.btn-logout { background: #ef4444; }

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>🔐 Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">

    <button class="btn-login" onclick="login()">Entrar</button>

    <div id="status"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardBox" class="hidden">
    <h2>🚀 Dashboard</h2>

    <button onclick="irAtivar()">🔔 Ativar Notificações</button>
    <button onclick="logout()" class="btn-logout">Sair</button>
  </div>

</div>

<script>
const API = "https://api-push.onrender.com";

// 🔁 CONTROLE DE TELA
window.onload = () => {
  const token = localStorage.getItem("token");

  if (token) {
    mostrarDashboard();
  }
};

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      mostrarDashboard();
    } else {
      document.getElementById("status").innerText = "❌ Login inválido";
    }

  } catch {
    document.getElementById("status").innerText = "❌ Erro de conexão";
  }
}

// MOSTRAR DASHBOARD
function mostrarDashboard() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboardBox").classList.remove("hidden");
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// IR PARA ATIVAR
function irAtivar() {
  window.location.href = "ativar.html";
}
</script>

</body>
</html>
