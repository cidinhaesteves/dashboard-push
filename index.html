<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Push Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.wrapper {
  display: flex;
  gap: 20px;
}

.container {
  width: 320px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

.preview {
  width: 260px;
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.send { background: #22c55e; }
.logout { background: #ef4444; }

.counter {
  font-size: 12px;
  text-align: right;
  opacity: 0.7;
}

/* PREVIEW */
.notification {
  background: #1e293b;
  padding: 10px;
  border-radius: 8px;
}

.title {
  font-weight: bold;
}

.body {
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- LOGIN -->
<div class="container" id="loginBox">
  <h2>🔐 Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <div id="loginStatus"></div>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboardBox">

  <h2>🚀 Push Dashboard</h2>

  <input id="titleInput" maxlength="30" placeholder="Título">
  <div class="counter" id="titleCount">0 / 30</div>

  <textarea id="messageInput" maxlength="120" placeholder="Mensagem"></textarea>
  <div class="counter" id="msgCount">0 / 120</div>

  <button class="send" onclick="sendPush()">Enviar Push</button>
  <button class="logout" onclick="logout()">Sair</button>

  <div id="pushStatus"></div>

</div>

<!-- PREVIEW -->
<div class="preview" id="previewBox">
  <h3>📱 Preview</h3>

  <div class="notification">
    <div class="title" id="previewTitle">Título...</div>
    <div class="body" id="previewBody">Mensagem...</div>
  </div>

</div>

</div>

<script>
const API = "https://api-push.onrender.com";

// AUTO LOGIN
window.onload = () => {
  const token = localStorage.getItem("token");
  if (token) showDashboard();
};

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    showDashboard();
  } else {
    document.getElementById("loginStatus").innerText = "❌ Login inválido";
  }
}

// SHOW
function showDashboard() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboardBox").style.display = "block";
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// CONTADORES + PREVIEW
const titleInput = document.getElementById("titleInput");
const messageInput = document.getElementById("messageInput");

titleInput.addEventListener("input", () => {
  document.getElementById("titleCount").innerText =
    titleInput.value.length + " / 30";

  document.getElementById("previewTitle").innerText =
    titleInput.value || "Título...";
});

messageInput.addEventListener("input", () => {
  document.getElementById("msgCount").innerText =
    messageInput.value.length + " / 120";

  document.getElementById("previewBody").innerText =
    messageInput.value || "Mensagem...";
});

// SEND PUSH
async function sendPush() {
  const token = localStorage.getItem("token");

  const title = titleInput.value;
  const body = messageInput.value;

  const status = document.getElementById("pushStatus");

  if (!title || !body) {
    status.innerText = "⚠️ Preencha tudo";
    return;
  }

  status.innerText = "⏳ Enviando...";

  const res = await fetch(API + "/send-push", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ title, body })
  });

  if (res.status === 401) {
    localStorage.removeItem("token");
    alert("Sessão expirada");
    location.reload();
    return;
  }

  const data = await res.json();

  if (data.success) {
    status.innerText = "✅ Enviado para " + data.sent + " dispositivos";
  } else {
    status.innerText = "❌ Erro";
  }
}
</script>

</body>
</html>
