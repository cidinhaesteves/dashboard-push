<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>
</head>

<body>

<h1>🔔 Ativar Notificações</h1>
<button onclick="ativar()">Ativar Notificações</button>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCN0S5pMthAbPyC1LkYy-t2xFDoc8QuR8A",
  authDomain: "eco-goias.firebaseapp.com",
  projectId: "eco-goias",
  storageBucket: "eco-goias.firebasestorage.app",
  messagingSenderId: "31870991742",
  appId: "1:31870991742:web:2ea58294b93441b47c5d4f",
  measurementId: "G-RJVTCZ41QX"
};

firebase.initializeApp(firebaseConfig);

const messaging = firebase.messaging();

async function ativar(){
try{

// 🔥 REGISTRA SERVICE WORKER
const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

console.log("SW registrado:", registration);

// 🔥 PERMISSÃO
const permission = await Notification.requestPermission();

if (permission !== "granted") {
  alert("Permissão negada ❌");
  return;
}

// 🔥 TOKEN COM VAPID NOVA (CORRIGIDO)
const token = await messaging.getToken({
  vapidKey: "BDYA2CYQPxNKnJb1D80ULDUNrLv0Q4tFIC74-ZSkyvqt6VVJZtMiFhakg8_1iVQTmU4H37jh_57QKrzpQPiUMBM",
  serviceWorkerRegistration: registration
});

console.log("TOKEN GERADO:", token);

// 🔥 SALVA NO LOCAL STORAGE
localStorage.setItem("token", token);

// 🔥 ENVIA PARA API
await fetch("https://api-push.onrender.com/save-token", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ token })
});

alert("Notificações ativadas com sucesso 🚀");

}catch(err){
console.error(err);
alert("Erro ao ativar notificações ❌");
}
}
</script>

</body>
</html>
