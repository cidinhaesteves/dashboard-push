<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 5px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#erro {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="erro"></p>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    const response = await fetch("https://api-push.onrender.com/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        senha: senha // 🔥 ESSENCIAL
      })
    });

    const data = await response.json();

    if (response.ok) {
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("erro").innerText = "Login inválido ❌";
    }

  } catch (err) {
    document.getElementById("erro").innerText = "Erro de conexão ❌";
  }
}
</script>

</body>
</html>
