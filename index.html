<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h2 {
  color: #fff;
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.erro {
  color: #f87171;
  margin-top: 10px;
  text-align: center;
}
</style>

</head>

<body>

<div class="card">
  <h2>🔐 Login</h2>

  <input type="email" id="email" placeholder="Email" value="admin@email.com">
  <input type="password" id="senha" placeholder="Senha" value="123456">

  <button onclick="login()">Entrar</button>

  <div id="erro" class="erro"></div>
</div>

<script>

// 🔒 Se já estiver logado → vai direto pro dashboard
const token = localStorage.getItem("token");

if (token) {
  window.location.href = "/dashboard.html";
}

// 🔥 LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const erroDiv = document.getElementById("erro");

  erroDiv.innerText = "";

  try {
    const res = await fetch("https://api-push.onrender.com/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, senha })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);

      // ✅ REDIRECIONAMENTO CORRETO
      window.location.href = "/dashboard.html";
    } else {
      erroDiv.innerText = "Login inválido ❌";
    }

  } catch (err) {
    erroDiv.innerText = "Erro de conexão ❌";
  }
}

</script>

</body>
</html>
