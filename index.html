<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Push Dashboard PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .success {
      color: #22c55e;
      margin-top: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login">
    <h2>🔐 Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div id="loginMsg"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h2>🚀 Push Dashboard</h2>

    <input id="title" placeholder="Título">
    <textarea id="body" placeholder="Mensagem"></textarea>

    <button onclick="sendPush()">Enviar Push</button>

    <button onclick="logout()" style="background:#ef4444;margin-top:10px;">
      Sair
    </button>

    <div id="msg"></div>
  </div>

</div>

<script>
const API = "https://api-push.onrender.com";

// =====================
// AUTO LOGIN
// =====================
window.onload = () => {
  const token = localStorage.getItem("token");

  if (token) {
    showDashboard();
  }
};

// =====================
// LOGIN
// =====================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    showDashboard();
  } else {
    document.getElementById("loginMsg").innerHTML =
      `<div class="error">${data.error}</div>`;
  }
}

// =====================
// MOSTRAR DASHBOARD
// =====================
function showDashboard() {
  document.getElementById("login").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// =====================
// ENVIAR PUSH
// =====================
async function sendPush() {
  const title = document.getElementById("title").value;
  const body = document.getElementById("body").value;

  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/send-push`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ title, body })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("msg").innerHTML =
      `<div class="success">✅ Enviado para ${data.sent} dispositivos</div>`;
  } else {
    document.getElementById("msg").innerHTML =
      `<div class="error">❌ ${data.error}</div>`;
  }
}
</script>

</body>
</html>
